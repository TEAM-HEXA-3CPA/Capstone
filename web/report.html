<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deep Study | 고도화 리포트</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
</head>
<body>

<header>
    <a href="main-home.html" class="logo" style="text-decoration: none;">Deep Study</a>
    <nav>
        <a href="control.html">집중분석</a>
        <a href="report.html" style="color: var(--primary); font-weight: 800;">리포트</a>
        <a href="rank.html">전체랭킹</a>
        <a href="index.html">로그인</a>
        <button id="themeToggleBtn" class="theme-toggle-btn" onclick="toggleTheme()">🌙</button>
    </nav>
</header>

<div class="container">
    <section id="report" style="padding-top: 100px;">
        <div class="report-header">
            <div>
                <h2>종합 몰입 분석 보고서</h2>
                <p style="color:var(--text-sub)">AI가 정밀 측정한 5가지 핵심 수치 지표입니다.</p>
            </div>
            <div style="text-align: right;">
                <span style="font-size: 0.8rem; color:var(--text-sub)">데이터 세션 기준</span>
                <p style="font-weight: 700; color: var(--primary);">오늘 누적 세션 분석</p>
            </div>
        </div>

        <div class="report-grid" style="margin-bottom: 30px;">
            <div class="card">
                <span class="chart-label">🕒 1. 실시간 몰입도 추이 (최근 1시간)</span>
                <div style="position: relative; height:220px;"><canvas id="lineChart"></canvas></div>
            </div>
            <div class="card">
                <span class="chart-label">📊 2. 요일별 순수 집중 시간 (단위: 분)</span>
                <div style="position: relative; height:220px;"><canvas id="barChart"></canvas></div>
            </div>
            <div class="card">
                <span class="chart-label">🕸️ 3. 몰입 다차원 요소 분석</span>
                <div style="position: relative; height:220px; display: flex; justify-content: center;"><canvas id="radarChart"></canvas></div>
            </div>
            <div class="card">
                <span class="chart-label">🍩 4. 세션 타임라인 점유율</span>
                <div style="position: relative; height:220px; display: flex; justify-content: center;"><canvas id="doughnutChart"></canvas></div>
            </div>
        </div>

        <div class="card" style="margin-bottom: 40px; padding: 30px;">
            <div style="display: flex; justify-content: space-between; margin-bottom: 10px; font-weight: 700;">
                <span>🎯 5. 오늘 목표 학습량 달성률</span>
                <span id="progress-percent" style="color: var(--primary);">75%</span>
            </div>
            <div style="background: var(--border); width: 100%; height: 16px; border-radius: 8px; overflow: hidden;">
                <div id="progress-bar" style="background: var(--primary); width: 75%; height: 100%; transition: width 0.5s ease-in-out;"></div>
            </div>
            <p style="font-size: 0.85rem; color: var(--text-sub); margin-top: 10px;">일일 목표 4시간 중 3시간을 완수했습니다.</p>
        </div>

        <div class="card" style="border: 1px dashed var(--primary); background: var(--primary-light);">
            <h4 style="color: var(--primary); margin-bottom: 15px;">⚙️ 시각화 실시간 수치 조정 패널 (데모 검증용)</h4>
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px;">
                <div>
                    <label style="font-size:0.8rem; font-weight:700;">최근 몰입 점수</label>
                    <input type="range" min="0" max="100" value="88" oninput="updateDemoData('line', this.value)">
                </div>
                <div>
                    <label style="font-size:0.8rem; font-weight:700;">오늘 집중 비중 (%)</label>
                    <input type="range" min="0" max="100" value="80" oninput="updateDemoData('ratio', this.value)">
                </div>
                <div>
                    <label style="font-size:0.8rem; font-weight:700;">목표 달성률 (%)</label>
                    <input type="range" min="0" max="100" value="75" oninput="updateDemoData('progress', this.value)">
                </div>
            </div>
        </div>
    </section>
</div>

<script src="script.js"></script>
</body>
</html>
