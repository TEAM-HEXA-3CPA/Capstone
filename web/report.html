<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FocusMate | 고도화 리포트</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
</head>
<body>

<header>
    <a href="main-home.html" class="logo" style="text-decoration: none;">FocusMate</a>
    <nav style="display: flex; align-items: center;">
        <a href="control.html">집중분석</a>
        <a href="rank.html">전체랭킹</a>
        
        <div class="user-menu-container">
            <a href="#" id="userTrigger" onclick="toggleUserDropdown(event)" class="user-menu-trigger">👤 님 ▾</a>
            <div class="user-dropdown-box" id="userDropdown">
                <div class="user-info-summary">
                    <div class="user-info-name"></div>
                    <div class="user-info-email"></div>
                    <a href="report.html" class="dropdown-item" style="color: var(--primary); font-weight: bold; padding-left: 0;">📊 나의 몰입 리포트</a>
                </div>
                <div class="dropdown-divider"></div>
                <a href="#" onclick="handleLeaveGroup(event)" class="dropdown-item">🏃 소속 그룹 탈퇴</a>
                <a href="#" onclick="handleDeleteAccount(event)" class="dropdown-item danger">❌ 서비스 회원 탈퇴</a>
                <div class="dropdown-divider"></div>
                <a href="#" onclick="handleLogout(event)" class="dropdown-item" style="color: var(--text-sub);">로그아웃</a>
            </div>
        </div>
        <button id="themeToggleBtn" class="theme-toggle-btn" onclick="toggleTheme()" style="margin-left: 25px;">🌙</button>
    </nav>
</header>

<div class="container">
    <section id="report" style="padding-top: 100px;">
        <div class="report-header">
            <div>
                <h2>종합 몰입 분석 보고서</h2>
                <p style="color: var(--text-sub); margin-top: 5px;">인공지능 모델이 정밀하게 정형화한 세부 집중 분석 데이터입니다.</p>
            </div>
            <div class="date-badge">2024년 11월 17일 기준</div>
        </div>

        <div class="report-grid">
            <div class="card">
                <h3>📈 최근 5일간 몰입도 추이</h3>
                <div class="chart-container">
                    <canvas id="lineChart"></canvas>
                </div>
            </div>
            <div class="card">
                <h3>📊 오늘 하루 집중도 분포 비중</h3>
                <div class="chart-container">
                    <canvas id="doughnutChart"></canvas>
                </div>
            </div>
        </div>

        <div class="card" style="margin-top: 30px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h3 style="margin: 0;">🎯 일일 집중 목표 달성률</h3>
                <span style="font-size: 1.2rem; font-weight: 800; color: var(--primary);">75%</span>
            </div>
            <div style="background: var(--border); width: 100%; height: 16px; border-radius: 8px; overflow: hidden;">
                <div id="progress-bar" style="background: var(--primary); width: 75%; height: 100%; transition: width 0.5s ease-in-out;"></div>
            </div>
            <p style="font-size: 0.85rem; color: var(--text-sub); margin-top: 10px;">일일 목표 4시간 중 3시간을 완수했습니다.</p>
        </div>

        <div class="card" style="border: 1px dashed var(--primary); background: var(--primary-light); margin-top: 30px;">
            <h4 style="color: var(--primary); margin-bottom: 15px;">⚙️ 시각화 실시간 수치 조정 패널 (데모 검증용)</h4>
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px;">
                <div>
                    <label style="font-size:0.8rem; font-weight:700;">최근 몰입 점수</label>
                    <input type="range" min="0" max="100" value="88" oninput="updateDemoData('line', this.value)">
                </div>
                <div>
                    <label style="font-size:0.8rem; font-weight:700;">오늘 집중 비중 (%)</label>
                    <input type="range" min="0" max="100" value="80" oninput="updateDemoData('ratio', this.value)">
                </div>
            </div>
        </div>
    </section>
</div>

<script src="script.js"></script>
</body>
</html>
