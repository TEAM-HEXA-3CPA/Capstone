<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FocusMate | 로그인</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
</head>
<body>

<header>
    <a href="main-home.html" class="logo" style="text-decoration: none;">FocusMate</a>
    <nav>
        <a href="control.html">집중분석</a>
        <a href="report.html">리포트</a>
        <a href="rank.html">전체랭킹</a>
        <a href="index.html">회원가입</a> </nav>
</header>

<div class="container">
    <section id="login">
        <div class="auth-card card">
            <div class="auth-info">
                <h2>다시 몰입할<br>시간입니다.</h2>
                <p style="color:var(--text-sub)">아이디와 비밀번호를 입력하고 학습을 이어가세요.</p>
            </div>
            
            <form action="/login" method="POST" id="loginForm">
                <div class="input-group">
                    <label>아이디</label>
                    <input type="text" name="user_id" placeholder="ID" required>
                </div>
                <div class="input-group">
                    <label>비밀번호</label>
                    <input type="password" name="password" placeholder="비밀번호" required>
                </div>
                
                <button type="submit" class="btn btn-primary">로그인</button>
            </form>
        </div>
    </section>
</div>

</body>
</html>
