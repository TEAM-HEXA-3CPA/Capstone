<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deep Study | 로그인</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
</head>
<body>

<header>
    <a href="main-home.html" class="logo" style="text-decoration: none;">Deep Study</a>
    <nav>
        <a href="control.html">집중분석</a>
        <a href="report.html">리포트</a>
        <a href="rank.html">전체랭킹</a>
        <a href="index.html" style="color: var(--primary); font-weight: 800;">로그인</a>
        <button id="themeToggleBtn" class="theme-toggle-btn" onclick="toggleTheme()">🌙</button>
    </nav>
</header>

<div class="container">
    <section id="login">
        <div class="auth-card card">
            <div class="auth-info">
                <h2>더 높은 몰입을<br>경험하세요.</h2>
                <p style="color:var(--text-sub)">정밀 측정과 랭킹 시스템이 당신의 학습 효율을 극대화합니다.</p>
            </div>
            <form>
                <div class="input-group"><label>이름</label><input type="text" maxlength="10" placeholder="실명을 입력하세요"></div>
                <div class="input-group"><label>전화번호</label><input type="tel" placeholder="01012345678"></div>
                <div class="input-group"><label>닉네임</label><input type="text" maxlength="10" placeholder="랭킹에 표시될 이름"></div>
                <div class="input-group"><label>아이디</label><input type="text" maxlength="20" placeholder="ID"></div>
                <div class="input-group"><label>비밀번호</label><input type="password" placeholder="비밀번호 확인"></div>
                <button type="button" class="btn btn-primary" onclick="location.href='control.html'">인증 및 로그인</button>
            </form>
        </div>
    </section>
</div>

<script src="script.js"></script>
</body>
</html>
