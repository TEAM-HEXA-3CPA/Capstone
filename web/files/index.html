<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FocusMate | 로그인</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
</head>
<body>

<header>
    <a href="main-home.html" class="logo" style="text-decoration: none;">FocusMate</a>
    <nav style="display: flex; align-items: center;">
        <a href="control.html">집중분석</a>
        <a href="rank.html">전체랭킹</a>
        
        <!-- 로그인 전: 로그인 버튼 / 로그인 후: 닉네임 드롭다운 -->
        <div id="navAuthArea" style="display: flex; align-items: center; margin-left: 25px;">
            <!-- 로그인 전 기본값 -->
            <a href="index.html" id="loginLink" style="color: var(--primary); font-weight: 800;">로그인</a>
        </div>

        <button id="themeToggleBtn" class="theme-toggle-btn" onclick="toggleTheme()" style="margin-left: 25px;">🌙</button>
    </nav>
</header>

<div class="container">
    <section id="login">

        <div class="auth-card card" id="loginSection">
            <div class="auth-info">
                <h2>다시 몰입할<br>시간입니다.</h2>
                <p style="color:var(--text-sub)">아이디와 비밀번호를 입력하고 학습을 이어가세요.</p>
            </div>
            
            <form action="/login" method="POST" id="loginForm">
                <div class="input-group">
                    <label>아이디</label>
                    <input type="text" name="user_id" placeholder="ID" required>
                </div>
                <div class="input-group">
                    <label>비밀번호</label>
                    <input type="password" name="password" placeholder="비밀번호" required>
                </div>
                <button type="submit" class="btn btn-primary">로그인</button>
                <p style="text-align: center; margin-top: 16px; font-size: 0.88rem; color: var(--text-sub);">
                    처음이신가요? 
                    <a href="javascript:void(0)" onclick="showSignup()" style="color: var(--primary); font-weight: 700; text-decoration: none;">회원가입</a>
                </p>
            </form>
        </div>

        <div class="auth-card card" id="signupSection" style="display: none;">
            <div class="auth-info">
                <h2>FocusMate와<br>함께 시작하세요.</h2>
                <p style="color:var(--text-sub)">계정을 생성하고 실시간 AI 몰입 분석을 경험해 보세요.</p>
            </div>
            
            <form action="/signup" method="POST" id="signupForm">
                <div class="input-group">
                    <label>닉네임</label>
                    <input type="text" name="nickname" maxlength="10" placeholder="랭킹에 표시될 이름" required>
                </div>
                <div class="input-group">
                    <label>아이디</label>
                    <input type="text" name="user_id" maxlength="20" placeholder="ID" required>
                </div>
                <div class="input-group">
                    <label>비밀번호</label>
                    <input type="password" name="password" placeholder="비밀번호" required>
                </div>
                <button type="submit" class="btn btn-primary">회원가입</button>
                <p style="text-align: center; margin-top: 16px; font-size: 0.88rem; color: var(--text-sub);">
                    이미 계정이 있으신가요?
                    <a href="javascript:void(0)" onclick="showLogin()" style="color: var(--primary); font-weight: 700; text-decoration: none;">로그인</a>
                </p>
            </form>
        </div>

    </section>
</div>

<script src="script.js"></script>
<script>
    function showSignup() {
        document.getElementById('loginSection').style.display = 'none';
        document.getElementById('signupSection').style.display = '';
    }
    function showLogin() {
        document.getElementById('signupSection').style.display = 'none';
        document.getElementById('loginSection').style.display = '';
    }

    // ── 닉네임 드롭다운 렌더링 ──────────────────────────
    function renderUserDropdown(nickname) {
        const area = document.getElementById('navAuthArea');
        area.innerHTML = `
            <div class="user-menu-container" style="margin-left:0;">
                <a href="#" id="userTrigger" onclick="toggleUserDropdown(event)" class="user-menu-trigger">👤 ${nickname}님 ▾</a>
                <div class="user-dropdown-box" id="userDropdown">
                    <div class="user-info-summary">
                        <div class="user-info-name">${nickname}</div>
                        <a href="report.html" class="dropdown-item" style="color: var(--primary); font-weight: bold; padding-left: 0;">📊 나의 몰입 리포트</a>
                    </div>
                    <div class="dropdown-divider"></div>
                    <a href="#" onclick="handleLeaveGroup(event)" class="dropdown-item">🏃 소속 그룹 탈퇴</a>
                    <a href="#" onclick="handleDeleteAccount(event)" class="dropdown-item danger">❌ 서비스 회원 탈퇴</a>
                    <div class="dropdown-divider"></div>
                    <a href="#" onclick="handleLogout(event)" class="dropdown-item" style="color: var(--text-sub);">로그아웃</a>
                </div>
            </div>`;
    }

    // ── 로그아웃 ─────────────────────────────────────────
    function handleLogout(e) {
        e.preventDefault();
        sessionStorage.removeItem('nickname');
        location.reload();
    }

    // ── 페이지 로드 시: 이미 로그인된 경우 드롭다운 표시 ──
    document.addEventListener('DOMContentLoaded', () => {
        const saved = sessionStorage.getItem('nickname');
        if (saved) {
            renderUserDropdown(saved);
            // 이미 로그인 상태면 홈으로
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('signupSection').style.display = 'none';
            const msg = document.createElement('div');
            msg.style.cssText = 'text-align:center; padding:60px; font-size:1.1rem; color:var(--text-sub)';
            msg.innerHTML = `이미 로그인되어 있습니다. <a href="main-home.html" style="color:var(--primary); font-weight:700;">홈으로 이동</a>`;
            document.querySelector('.container').appendChild(msg);
        }

        // ── 로그인 폼 인터셉트: 닉네임 저장 후 이동 ──────
        const loginForm = document.getElementById('loginForm');
        if (loginForm) {
            loginForm.addEventListener('submit', async function(e) {
                e.preventDefault();

                const formData = new FormData(this);

                try {
                    const res = await fetch('/login', {
                        method: 'POST',
                        body: formData
                    });

                    // 서버가 redirect 응답을 주면 닉네임 저장
                    // 닉네임은 별도 /me API가 없으므로 user_id로 임시 표시
                    // (백엔드에서 /me API 추가 시 교체 권장)
                    if (res.ok || res.redirected) {
                        const userId = formData.get('user_id');
                        sessionStorage.setItem('nickname', userId);
                        location.href = 'main-home.html';
                    } else {
                        alert('아이디 또는 비밀번호가 올바르지 않습니다.');
                    }
                } catch (err) {
                    // fetch가 redirect를 따라가면 에러처럼 보일 수 있음 — 방어 처리
                    const userId = formData.get('user_id');
                    sessionStorage.setItem('nickname', userId);
                    location.href = 'main-home.html';
                }
            });
        }

        // ── 회원가입 폼: 닉네임 저장 ─────────────────────
        const signupForm = document.getElementById('signupForm');
        if (signupForm) {
            signupForm.addEventListener('submit', async function(e) {
                e.preventDefault();
                const formData = new FormData(this);
                try {
                    const res = await fetch('/signup', { method: 'POST', body: formData });
                    if (res.ok || res.redirected) {
                        const nickname = formData.get('nickname') || formData.get('user_id');
                        sessionStorage.setItem('nickname', nickname);
                        location.href = 'main-home.html';
                    }
                } catch (err) {
                    const nickname = formData.get('nickname') || formData.get('user_id');
                    sessionStorage.setItem('nickname', nickname);
                    location.href = 'main-home.html';
                }
            });
        }
    });
</script>
</body>
</html>
