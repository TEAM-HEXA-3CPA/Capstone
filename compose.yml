version: "3.9"

services:
  web:
    build: ./web
    container_name: web
    ports:
      - "8000:8000"
    depends_on:
      - ai
    volumes:
      - ./web:/app

  ai:
    build: ./ai
    container_name: focus-ai
    ports:
      - "8001:8001"
    devices:
      - "/dev/video0:/dev/video0"
    volumes:
      - ./ai:/app
    privileged: true
