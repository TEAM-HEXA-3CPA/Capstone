services:
  web:
    build:
      context: ./web
      dockerfile: Dockerfile.web
    container_name: web
    ports:
      - "80:80"
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: backend/Dockerfile.backend
    container_name: focus-backend
    expose:
      - "5000"
      - "8000"
    env_file:
      - .env
